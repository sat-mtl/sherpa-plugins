name: Build
on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  # Build in/against ossia score: dev tree, SDK, JIT and release tracks (same
  # four-track pipeline as score-addon-cv / score-addon-onnx). The addon ships
  # a release.sh + addon.json, so the release track packages the source zip and
  # uploads it on v* tags. The "latest"-SDK/JIT lanes need a released score that
  # ships the unified avnd addon API; until then they behave like
  # score-addon-cv's (continuous green, latest red).
  score:
    uses: ossia/actions/.github/workflows/score-addon.yml@master
    secrets: inherit
  # Build the same object(s) standalone, one artifact per back-end. The Max /
  # TouchDesigner / Godot jobs zip build/package/sherpa-plugins/ (produced by
  # avnd_addon_package), which bundles the prebuilt sherpa-onnx + onnxruntime libs.
  standalone:
    uses: ossia/actions/.github/workflows/avnd-addon.yml@master
    secrets: inherit
    with:
      pd: true
      max: true
      python: true
      touchdesigner: true
      godot: true
      # wasm omitted: sherpa-onnx ships no emscripten C++ prebuilt.
