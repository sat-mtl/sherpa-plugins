name: Portability
on:
  pull_request:
  push:
    branches: [main, master]
concurrency:
  group: ${{ github.workflow }}-portability-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  smoke:
    uses: ossia/actions/.github/workflows/avnd-portability.yml@master
    secrets: inherit
    with:
      # Restrict to lanes where a sherpa-onnx prebuilt exists (desktop).
      windows_msvc: false
      windows_mingw: false
      freebsd: false
      wasm: false
      android: false
      ios: false
