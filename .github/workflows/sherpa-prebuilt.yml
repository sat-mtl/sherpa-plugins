name: sherpa-onnx prebuilt C API

# Builds the prebuilt, dlopen'able sherpa-onnx C-API shared library
# (libsherpa-onnx-c-api + libonnxruntime) for every desktop platform and publishes
# the archives this addon consumes (cmake/sherpa-onnx.cmake, SHERPA_ONNX_FETCH_LIBS).
#
# Run manually (workflow_dispatch) to produce downloadable artifacts, or push a tag
# `prebuilt-v<version>` to additionally create/attach a GitHub Release whose assets
# are what cmake/sherpa-onnx.cmake fetches from
#   https://github.com/sat-mtl/sherpa-plugins/releases/download/prebuilt-v<version>/
#
# sherpa-onnx is built here with its supported toolchains (gcc / Apple-clang / MSVC)
# so the clang-built addon never has to compile it.

on:
  workflow_dispatch:
    inputs:
      sherpa_version:
        description: "sherpa-onnx version to build (without leading v)"
        default: "1.13.3"
  push:
    tags: ["prebuilt-v*"]

permissions:
  contents: write

env:
  # Default version; overridden by the workflow_dispatch input or the tag name.
  SHERPA_VERSION: "1.13.3"
  # Bound the compile parallelism: GitHub runners have little RAM (7-16 GB) and
  # sherpa's heavy C++ TUs (kaldi / openfst / espeak / piper) OOM with an
  # unbounded `-j`. Keep this small.
  BUILD_JOBS: "2"

jobs:
  build:
    name: ${{ matrix.triplet }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,     triplet: linux-x64,    ext: tar.gz }
          # arm64 Linux runner (may need org enablement); remove if unavailable.
          - { os: ubuntu-24.04-arm, triplet: linux-arm64,  ext: tar.gz }
          - { os: macos-14,         triplet: macos-arm64,  ext: tar.gz }
          - { os: macos-13,         triplet: macos-x64,    ext: tar.gz }
          - { os: windows-2022,     triplet: windows-x64,  ext: zip }
    steps:
      - name: Resolve version
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ github.event.inputs.sherpa_version }}"
          elif [[ "$ref" == prebuilt-v* ]]; then
            v="${ref#prebuilt-v}"
          else
            v="${SHERPA_VERSION}"
          fi
          echo "VER=$v" >> "$GITHUB_ENV"
          echo "Building sherpa-onnx v$v"

      - name: Checkout sherpa-onnx
        uses: actions/checkout@v4
        with:
          repository: k2-fsa/sherpa-onnx
          ref: v${{ env.VER }}
          path: sherpa-onnx

      - name: Configure
        shell: bash
        working-directory: sherpa-onnx
        run: |
          # PYTHON=OFF is required: BUILD_SHARED_LIBS=ON silently enables it.
          common=(
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=ON
            -DSHERPA_ONNX_ENABLE_C_API=ON
            -DSHERPA_ONNX_ENABLE_TTS=ON
            -DSHERPA_ONNX_ENABLE_PYTHON=OFF
            -DSHERPA_ONNX_ENABLE_TESTS=OFF
            -DSHERPA_ONNX_ENABLE_BINARY=OFF
            -DSHERPA_ONNX_ENABLE_PORTAUDIO=OFF
            -DSHERPA_ONNX_ENABLE_WEBSOCKET=OFF
            -DSHERPA_ONNX_ENABLE_JNI=OFF
            "-DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/dist"
          )
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -S . -B build -A x64 "${common[@]}"
          else
            cmake -S . -B build "${common[@]}"
          fi

      - name: Build & install
        shell: bash
        working-directory: sherpa-onnx
        run: cmake --build build --config Release --target install --parallel "${BUILD_JOBS}"

      - name: Package (root = include/ lib/ [bin/])
        shell: bash
        run: |
          out="${GITHUB_WORKSPACE}/sherpa-onnx-cabi-${{ matrix.triplet }}.${{ matrix.ext }}"
          cd "${GITHUB_WORKSPACE}/dist"
          if [[ "${{ matrix.ext }}" == "zip" ]]; then
            cmake -E tar cf "$out" --format=zip .
          else
            cmake -E tar czf "$out" --format=gnutar .
          fi
          echo "Packaged:"; ls -la "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-cabi-${{ matrix.triplet }}
          path: sherpa-onnx-cabi-${{ matrix.triplet }}.${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/prebuilt-v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: sherpa-onnx prebuilt C API (${{ github.ref_name }})
          files: artifacts/*
          fail_on_unmatched_files: true
