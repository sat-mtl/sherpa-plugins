name: Tests
on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-14 cmake ninja-build catch2 curl xz-utils

      # Avendish requires Boost >= 1.87; ubuntu-24.04's apt Boost is 1.83, so
      # provision headers ourselves (like the ossia/actions workflows do).
      - name: Cache Boost
        id: boost-cache
        uses: actions/cache@v4
        with:
          path: boost-1.88.0
          key: boost-1.88.0-headers
      - name: Provision Boost
        if: steps.boost-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/boostorg/boost/releases/download/boost-1.88.0/boost-1.88.0-b2-nodocs.tar.xz" -o boost.tar.xz
          tar xf boost.tar.xz && rm -f boost.tar.xz
      - name: Set BOOST_ROOT
        run: echo "BOOST_ROOT=$PWD/boost-1.88.0" >> "$GITHUB_ENV"

      - name: Fetch prebuilt sherpa-onnx runtime library
        run: |
          mkdir -p sherpa-rt && cd sherpa-rt
          url="https://github.com/sat-mtl/sherpa-plugins/releases/download/prebuilt-v1.13.3/sherpa-onnx-cabi-linux-x64.tar.gz"
          curl -fsSL "$url" -o pkg.tgz
          tar xzf pkg.tgz && rm pkg.tgz
          echo "SHERPA_RT=$PWD" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Cache test models
        id: models-cache
        uses: actions/cache@v4
        with:
          path: models
          key: sherpa-test-models-v2

      - name: Download test models (best-effort)
        if: steps.models-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p models && cd models
          A="https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models"
          T="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models"
          get() { curl -fsSL "$1" -o m.tar.bz2 && tar xf m.tar.bz2 && rm -f m.tar.bz2 || echo "WARN: could not fetch $1"; }
          get "$A/sherpa-onnx-streaming-zipformer-en-20M-2023-02-17.tar.bz2"
          get "$A/sherpa-onnx-whisper-tiny.en.tar.bz2"
          get "$T/vits-piper-en_US-amy-low.tar.bz2"
          curl -fsSL "$A/silero_vad.onnx" -o silero_vad.onnx || echo "WARN silero_vad.onnx"
          # --- models for the extended features (best-effort; verify tags/names) ---
          P="https://github.com/k2-fsa/sherpa-onnx/releases/download/punctuation-models"
          AT="https://github.com/k2-fsa/sherpa-onnx/releases/download/audio-tagging-models"
          K="https://github.com/k2-fsa/sherpa-onnx/releases/download/kws-models"
          SS="https://github.com/k2-fsa/sherpa-onnx/releases/download/source-separation-models"
          SR="https://github.com/k2-fsa/sherpa-onnx/releases/download/speaker-recongition-models"
          SE="https://github.com/k2-fsa/sherpa-onnx/releases/download/speech-enhancement-models"
          SG="https://github.com/k2-fsa/sherpa-onnx/releases/download/speaker-segmentation-models"
          getf() { mkdir -p "$2"; curl -fsSL "$1" -o "$2/$(basename "$1")" || echo "WARN $1"; }
          get "$P/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12.tar.bz2"
          get "$AT/sherpa-onnx-zipformer-audio-tagging-2024-04-09.tar.bz2"
          get "$K/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01.tar.bz2"
          get "$SS/sherpa-onnx-spleeter-2stems-fp16.tar.bz2"
          getf "$SR/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx" spk
          getf "$SE/gtcrn_simple.onnx" denoise
          get "$SG/sherpa-onnx-pyannote-segmentation-3-0.tar.bz2"
          # diarization needs segmentation + a speaker embedding model in one dir
          if [ -d sherpa-onnx-pyannote-segmentation-3-0 ]; then
            cp spk/*.onnx sherpa-onnx-pyannote-segmentation-3-0/ 2>/dev/null || true
          fi

      - name: Export model env vars (only for what downloaded)
        run: |
          cd models
          on="sherpa-onnx-streaming-zipformer-en-20M-2023-02-17"
          off="sherpa-onnx-whisper-tiny.en"
          tts="vits-piper-en_US-amy-low"
          [ -d "$on" ]  && echo "SHERPA_TEST_ASR_ONLINE_MODEL=$PWD/$on"  >> "$GITHUB_ENV"
          [ -d "$off" ] && echo "SHERPA_TEST_ASR_OFFLINE_MODEL=$PWD/$off" >> "$GITHUB_ENV"
          [ -d "$tts" ] && echo "SHERPA_TEST_TTS_MODEL=$PWD/$tts"          >> "$GITHUB_ENV"
          [ -f "silero_vad.onnx" ] && echo "SHERPA_TEST_VAD_MODEL=$PWD"    >> "$GITHUB_ENV"
          w="$(ls "$on"/test_wavs/*.wav 2>/dev/null | head -1)"
          [ -n "$w" ] && echo "SHERPA_TEST_WAV=$PWD/$w" >> "$GITHUB_ENV"
          # extended features
          exp() { [ -d "$2" ] && echo "$1=$PWD/$2" >> "$GITHUB_ENV"; }
          exp SHERPA_TEST_TEXT_MODEL         sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12
          exp SHERPA_TEST_AUDIO_LABELS_MODEL sherpa-onnx-zipformer-audio-tagging-2024-04-09
          exp SHERPA_TEST_KWS_MODEL          sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01
          exp SHERPA_TEST_SOURCESEP_MODEL    sherpa-onnx-spleeter-2stems-fp16
          ls spk/*.onnx     >/dev/null 2>&1 && echo "SHERPA_TEST_SPEAKER_MODEL=$PWD/spk" >> "$GITHUB_ENV"
          ls denoise/*.onnx >/dev/null 2>&1 && echo "SHERPA_TEST_DENOISER_MODEL=$PWD/denoise" >> "$GITHUB_ENV"
          if ls sherpa-onnx-pyannote-segmentation-3-0/*3dspeaker*.onnx >/dev/null 2>&1; then
            echo "SHERPA_TEST_DIARIZATION_MODEL=$PWD/sherpa-onnx-pyannote-segmentation-3-0" >> "$GITHUB_ENV"
          fi
          echo "Model env:"; env | grep '^SHERPA_TEST_' || echo "(none downloaded)"

      - name: Configure
        env: { CC: gcc-14, CXX: g++-14 }
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DSHERPA_PLUGINS_TESTS=ON \
            -DSHERPA_ONNX_DIR="${SHERPA_RT}" \
            -DBOOST_ROOT="${BOOST_ROOT}" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0167=OLD

      - name: Build tests
        run: cmake --build build --target
             test_structural test_asr_offline test_asr_online test_vad test_tts

      - name: Run tests
        working-directory: build
        run: ctest -L sherpa_plugins --output-on-failure --no-tests=error
